<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Captcha Solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Captcha Solver</h1>
          <span class="header-badge">AI-Powered</span>
        </div>
      </div>
      <div class="header-toggle">
        <label class="switch" title="Auto-solve captchas">
          <input type="checkbox" id="autoSolve" checked>
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
        </label>
      </div>
    </header>

    <!-- Stats Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon detected-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </div>
        <div class="stat-data">
          <span class="stat-value mono" id="detected">0</span>
          <span class="stat-label">Detected</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon solved-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </div>
        <div class="stat-data">
          <span class="stat-value mono" id="solved">0</span>
          <span class="stat-label">Solved</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon failed-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </div>
        <div class="stat-data">
          <span class="stat-value mono" id="failed">0</span>
          <span class="stat-label">Failed</span>
        </div>
      </div>
    </section>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Settings -->
    <section class="settings">
      <h2 class="section-title">Configuration</h2>

      <div class="field-group">
        <div class="field">
          <label class="field-label" for="provider">Provider</label>
          <div class="select-wrapper">
            <select id="provider" class="select">
              <option value="anthropic">Claude — Anthropic</option>
              <option value="openai">GPT-4o — OpenAI</option>
              <option value="gemini">Gemini — Google</option>
              <option value="qwen">Qwen-VL — Alibaba</option>
              <option value="ollama">Ollama — Local LLM</option>
            </select>
            <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="apiKey">
            API Key
            <span class="key-indicator" id="keyIndicator" title="Not checked">
              <span class="key-dot" id="keyDot"></span>
              <span class="key-indicator-text" id="keyIndicatorText"></span>
            </span>
          </label>
          <div class="input-group">
            <input type="password" id="apiKey" class="input" placeholder="sk-..." autocomplete="off" spellcheck="false">
            <button id="verifyKey" class="input-addon verify-btn" title="Verify API key">
              <svg id="verifyIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 12l2 2 4-4"/>
                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
              </svg>
            </button>
            <button id="toggleKey" class="input-addon" title="Toggle visibility">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-hint" id="keyStatus">Click verify to check your key</span>
        </div>

        <div class="field">
          <label class="field-label" for="solveDelay">Solve Delay</label>
          <div class="input-with-unit">
            <input type="number" id="solveDelay" class="input mono" min="100" max="5000" step="100" value="500">
            <span class="input-unit">ms</span>
          </div>
          <span class="field-hint">Delay before auto-solving (100–5000ms)</span>
        </div>
      </div>
    </section>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Actions -->
    <div class="actions">
      <button id="save" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
        Save Settings
      </button>
      <button id="resetStats" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Reset
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-status" id="statusContainer">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="status">Ready</span>
      </div>
      <span class="footer-version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
